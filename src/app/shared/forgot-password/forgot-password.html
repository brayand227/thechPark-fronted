<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>🔐 Recuperar Contraseña</h3>
      <button class="close-btn" (click)="closeModal()">✕</button>
    </div>
    
    <div class="modal-body">
      <ng-container *ngIf="!emailSent; else successTemplate">
        <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
        
        <div class="input-group">
          <i class="bi bi-envelope"></i>
          <input 
            type="email" 
            [(ngModel)]="email" 
            placeholder="Correo electrónico"
            [disabled]="loading">
        </div>
        
        <button class="btn-submit" (click)="onSubmit()" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Enviando...' : 'Enviar instrucciones' }}
        </button>
      </ng-container>
      
      <ng-template #successTemplate>
        <div class="success-content">
          <div class="success-icon">📧</div>
          <h4>¡Correo enviado!</h4>
          <p>Hemos enviado un correo a <strong>{{ email }}</strong> con las instrucciones para restablecer tu contraseña.</p>
          <button class="btn-submit" (click)="closeModal()">Cerrar</button>
        </div>
      </ng-template>
    </div>
  </div>
</div>
