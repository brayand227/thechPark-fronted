<div class="reset-container">
  <div class="reset-card" *ngIf="!success; else successTemplate">
    <div class="reset-header">
      <div class="icon">🔐</div>
      <h2>Restablecer Contraseña</h2>
      <p>Ingresa tu nueva contraseña</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <i class="bi bi-lock"></i>
        <input 
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="Nueva contraseña"
          required>
        <button type="button" class="toggle-btn" (click)="togglePassword()">
          <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
        </button>
      </div>
      
      <div class="input-group">
        <i class="bi bi-shield-lock"></i>
        <input 
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirmar contraseña"
          required>
      </div>
      
      <button type="submit" class="btn-reset" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <span *ngIf="!loading">Actualizar Contraseña</span>
        <span *ngIf="loading">Actualizando...</span>
      </button>
      
      <a routerLink="/login" class="back-link">← Volver al inicio de sesión</a>
    </form>
  </div>

  <ng-template #successTemplate>
    <div class="reset-card success">
      <div class="success-icon">✅</div>
      <h2>¡Contraseña actualizada!</h2>
      <p>Tu contraseña ha sido cambiada exitosamente.</p>
      <p class="small-text">Serás redirigido al inicio de sesión...</p>
      <div class="spinner"></div>
    </div>
  </ng-template>
</div>
